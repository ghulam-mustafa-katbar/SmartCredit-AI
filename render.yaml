services:
  - type: web
    name: smartcredit-backend
    runtime: docker
    # Root directory is backend/ — so Docker context = backend/
    # COPY requirements.txt, COPY . . all resolve correctly
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://smart-credit-ai-one.vercel.app,https://smart-credit-ai-pearl.vercel.app"
      - key: PORT
        value: "8000"
