services:
  - type: web
    name: smartcredit-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://smart-credit-ai-one.vercel.app,https://smart-credit-ai-pearl.vercel.app,http://localhost:3000"
      - key: PYTHON_VERSION
        value: "3.12.0"
