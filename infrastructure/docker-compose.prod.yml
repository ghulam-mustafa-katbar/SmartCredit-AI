services:
  nginx:
    image: nginx:alpine
    container_name: smartcredit_nginx_prod
    restart: always
    ports:
      - "80:80"
      # - "443:443" # Uncomment when SSL is configured
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro # For SSL certs
    depends_on:
      - frontend
      - backend
    networks:
      - smartcredit_net

  db:
    image: postgres:15-alpine
    container_name: smartcredit_db_prod
    restart: always
    env_file:
      - ../.env
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartcredit_net

  redis:
    image: redis:7-alpine
    container_name: smartcredit_redis_prod
    restart: always
    volumes:
      - redis_data_prod:/data
    networks:
      - smartcredit_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: smartcredit_backend_prod
    restart: always
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - smartcredit_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: smartcredit_frontend_prod
    restart: always
    env_file:
      - ../.env
    depends_on:
      - backend
    networks:
      - smartcredit_net

networks:
  smartcredit_net:
    driver: bridge

volumes:
  postgres_data_prod:
  redis_data_prod:
